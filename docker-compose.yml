# Dev/demo topology: orchestrator API + Jaeger + web UI.
# Sandboxes are spawned by the orchestrator over the host docker socket, one
# locked-down container per (tenant, run). Build the executor image first:
#   docker build -t refactor-harness-executor:latest executor-image/
services:
  jaeger:
    image: jaegertracing/all-in-one:1.57
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686" # UI
      - "4318:4318"   # OTLP HTTP

  orchestrator:
    build:
      context: .
      dockerfile: infra/Dockerfile.orchestrator
    depends_on:
      - jaeger
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      JAEGER_UI_URL: http://localhost:16686
      TARGET_REPO: /app/test-fixtures/sample-repo
      SANDBOX_IMAGE: refactor-harness-executor:latest
      # docker-in-docker path shim: sandbox -v sources resolve on the HOST
      HOST_RUNS_ROOT: ${PWD}/.runs
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./test-fixtures:/app/test-fixtures:ro # pristine, read-only
      - ./.runs:/data/runs                    # per-run workspace copies
      - ./checkpoints:/data/checkpoints       # SqliteSaver survives restarts
    ports:
      - "8000:8000"

  web:
    build: ./web
    depends_on:
      - orchestrator
    ports:
      - "5173:80"
